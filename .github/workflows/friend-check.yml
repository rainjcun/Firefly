name: 友链每日巡检

on:
  schedule:
    - cron: '0 8 * * *' # 每天 UTC+8 16:00 执行
  workflow_dispatch: # 支持手动触发

jobs:
  check-friends:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 运行巡检脚本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/check-friends.js